<div class="page-content">
  <section class="welcome-section">
    <div class="hero-content">
      <div class="hero-text">
        <span class="eyebrow">
          {{ eyebrow() }}
        </span>

        <h1 class="hero-title">
          {{ title() }}
        </h1>

        <p class="description">
          {{ description() }}
        </p>

        <div class="welcome-actions">
          <p-button
            [label]="buttonText()"
            [routerLink]="buttonRoute()"
            icon="pi pi-arrow-right"
            iconPos="right"
            severity="help"
            styleClass="btn-primary-glow"
          />
        </div>
      </div>

      <div class="hero-image">
        <div class="image-glow"></div>
        <img [src]="imageBanner()" alt="Banner" />
      </div>
    </div>

    <!-- stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <i class="pi pi-book"></i>
        <h3>18K+</h3>
        <span>Libros</span>
      </div>

      <div class="stat-card">
        <i class="pi pi-users"></i>
        <h3>5K+</h3>
        <span>Usuarios</span>
      </div>

      <div class="stat-card">
        <i class="pi pi-star"></i>
        <h3>4.9</h3>
        <span>Rating</span>
      </div>

      <div class="stat-card">
        <i class="pi pi-tags"></i>
        <h3>320+</h3>
        <span>Categorías</span>
      </div>
    </div>
  </section>

  <section class="page-slot">
    <ng-content></ng-content>
  </section>
</div>
