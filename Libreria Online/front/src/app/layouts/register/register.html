<p-card header="Crear Cuenta" styleClass="register-card">
  <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
    <div class="name-row">
      <p-floatLabel>
        <input pInputText id="nombre" formControlName="nombre" />
        <label for="nombre">Nombre</label>
      </p-floatLabel>

      <p-floatLabel>
        <input pInputText id="apellido" formControlName="apellido" />
        <label for="apellido">Apellido</label>
      </p-floatLabel>
    </div>

    <p-floatLabel>
      <input pInputText id="direccion" formControlName="direccion" />
      <label for="direccion">Dirección</label>
    </p-floatLabel>

    <p-floatLabel>
      <input pInputText id="email" formControlName="email" />
      <label for="email">Email</label>
    </p-floatLabel>

    <p-floatLabel>
      <p-password
        id="password"
        formControlName="password"
        [toggleMask]="true"
        [feedback]="false"
      ></p-password>
      <label for="password">Contraseña</label>
    </p-floatLabel>

    @if (form.get('password')?.hasError('pattern') && form.get('password')?.touched) {
      <small class="p-error"> Mínimo 6 caracteres, 1 mayúscula y 1 número. </small>
    }

    <p-floatLabel>
      <p-password
        id="confirmPassword"
        formControlName="confirmPassword"
        [toggleMask]="true"
        [feedback]="false"
      ></p-password>
      <label for="confirmPassword">Confirmar contraseña</label>
    </p-floatLabel>

    @if (form.get('confirmPassword')?.hasError('noMatch') && form.get('confirmPassword')?.touched) {
      <small class="p-error"> Las contraseñas no coinciden </small>
    }

    <p-button
      label="Crear Cuenta"
      icon="pi pi-user-plus"
      type="submit"
      [disabled]="form.invalid"
      styleClass="register-btn"
    ></p-button>
  </form>
</p-card>
