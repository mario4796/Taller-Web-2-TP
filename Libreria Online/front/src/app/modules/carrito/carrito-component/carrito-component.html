@if (carrito()) {
  <div class="cart-layout">
    @for (detalle of carrito()!.detalles; track detalle.id) {
      <app-libro-carrito [detalle]="detalle" (onEliminar)="manejarBorrado($event)">
      </app-libro-carrito>
    }

    <div class="cart-summary">
      <h2>Resumen</h2>

      <div class="summary-row">
        <span>Productos</span>
        <span>{{ carrito()!.detalles.length }}</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span>${{ carrito()!.precio_total }}</span>
      </div>

      <p-button label="Finalizar Compra" icon="pi pi-check" (click)="finalizarCompra()"> </p-button>
    </div>
  </div>
} @else {
  <div class="empty-cart">
    <i class="pi pi-shopping-cart"></i>

    <h2>Tu carrito está vacío</h2>

    <p>Agrega algunos libros para comenzar.</p>
  </div>
}
