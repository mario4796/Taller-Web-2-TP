<div class="p-4" style="background-color: #0f111a; min-height: 100vh">
  <h2 class="text-white mb-4">Catálogo de Libros</h2>

  <div style="display: flex; flex-wrap: wrap; gap: 20px">
    @for (item of libros(); track item.id) {
      <div style="width: 300px">
        <app-libro-estanteria [libro]="item"></app-libro-estanteria>
      </div>
    } @empty {
      <p style="color: white">Cargando libros...</p>
    }
  </div>
</div>
