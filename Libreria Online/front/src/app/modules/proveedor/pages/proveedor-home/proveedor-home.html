<app-nav
 [userName]="userName"
 [role]="role">
</app-nav>

<app-home
 [eyebrow]="eyebrow"
 [title]="title"
 [description]="description"
 [buttonText]="buttonText"
 [buttonLink]="buttonLink"
 [role]="role">
</app-home>

<div style="padding: 2rem; max-width: 1200px; margin: 0 auto;">

  <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
    <app-agregar-libro (libroCreado)="obtenerLibros()"></app-agregar-libro>
  </div>

  <div class="card">
    <p-table
      [value]="libros"
      [loading]="cargando"
      [tableStyle]="{ 'min-width': '50rem' }"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="5"
      [rowsPerPageOptions]="[5, 10, 20]">

      <ng-template pTemplate="header">
        <tr>
          <th>Título</th>
          <th>Autor</th>
          <th>ISBN</th>
          <th>Precio</th>
          <th>Stock</th>
          <th style="text-align: center;">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-libro>
        <tr>
          <td><strong>{{ libro.nombre }}</strong></td>
          <td>{{ libro.autor }}</td>
          <td>{{ libro.isbn }}</td>
          <td>{{ libro.precio | currency:'USD':'symbol':'1.2-2':'es-AR' }}</td>
          <td>
            <span [style]="libro.stock < 5 ? 'color: red; font-weight: bold;' : ''">
              {{ libro.stock }} uds.
            </span>
          </td>
          <td style="text-align: center;">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" title="Editar"></p-button>
            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" title="Eliminar"></p-button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" style="text-align: center; padding: 2rem;">
            No hay libros cargados en la base de datos todavía.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

</div>
