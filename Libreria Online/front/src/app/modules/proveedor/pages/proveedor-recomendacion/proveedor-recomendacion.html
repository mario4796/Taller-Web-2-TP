<app-nav [userName]="userName" [role]="role" [activeItem]="activeItem"></app-nav>

<p-toast position="top-right"></p-toast>

<section class="recommendations-page">
  <header class="recommendations-header">
    <div>
      <p class="recommendations-eyebrow">Recomendacion de libros</p>
      <h2>Libros recomendados al administrador</h2>
      <p class="recommendations-description">Carga recomendaciones y revisa el estado de los libros que propusiste.</p>
    </div>

    <div class="recommendations-toolbar">
      <button pButton type="button" label="Nueva recomendacion" icon="pi pi-plus" severity="help" (click)="abrirNuevaRecomendacion()"></button>
    </div>
  </header>

  <div class="card">
    <app-recomendaciones-table
      [recomendaciones]="recomendaciones()"
      [cargando]="cargando()"
      (aceptar)="aceptarContraoferta($event)"
      (contraofertar)="abrirContraoferta($event)"
      (rechazar)="rechazarOferta($event)">
    </app-recomendaciones-table>
  </div>
</section>

<app-recomendacion-form-dialog
  [visible]="nuevaRecomendacionVisible()"
  [form]="recomendacionForm"
  [buscandoIsbn]="buscandoIsbn()"
  [guardando]="guardando()"
  [isbnVerificado]="isbnVerificado()"
  [portadaPreview]="portadaPreview()"
  (cerrar)="cerrarNuevaRecomendacion()"
  (buscarIsbn)="buscarPorIsbn()"
  (guardar)="guardarRecomendacion()">
</app-recomendacion-form-dialog>

<app-contraoferta-proveedor-dialog
  [visible]="contraofertaVisible()"
  [oferta]="ofertaSeleccionada()"
  [form]="contraofertaForm"
  [respondiendo]="respondiendo()"
  (cerrar)="cerrarContraoferta()"
  (enviar)="enviarContraoferta()">
</app-contraoferta-proveedor-dialog>
