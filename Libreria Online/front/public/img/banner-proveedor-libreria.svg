<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Banner proveedor librería online</title>
  <desc id="desc">Ilustración vectorial con libros, cajas de proveedor, carrito de logística e inventario para una librería online. Fondo transparente.</desc>

  <defs>
    <linearGradient id="bookBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bookViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bookAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Decorative transparent-safe shapes -->
  <circle cx="170" cy="76" r="52" fill="#38BDF8" opacity="0.12"/>
  <circle cx="1040" cy="88" r="66" fill="#A78BFA" opacity="0.13"/>
  <circle cx="980" cy="292" r="44" fill="#F59E0B" opacity="0.14"/>
  <path d="M90 276 C210 238 276 316 402 272 C512 234 594 246 690 286 C796 330 894 316 1004 270 C1088 235 1140 248 1186 276" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" opacity="0.22"/>
  <path d="M52 306 H1148" stroke="#64748B" stroke-width="4" stroke-linecap="round" opacity="0.24"/>

  <!-- Left floating catalog cards -->
  <g opacity="0.95" filter="url(#softShadow)">
    <rect x="90" y="116" width="190" height="132" rx="22" fill="#FFFFFF" opacity="0.88"/>
    <rect x="112" y="138" width="58" height="76" rx="10" fill="url(#bookBlue)"/>
    <rect x="184" y="138" width="72" height="12" rx="6" fill="#475569" opacity="0.8"/>
    <rect x="184" y="162" width="54" height="10" rx="5" fill="#94A3B8" opacity="0.9"/>
    <rect x="184" y="184" width="68" height="10" rx="5" fill="#CBD5E1" opacity="0.95"/>
    <rect x="184" y="206" width="42" height="10" rx="5" fill="#CBD5E1" opacity="0.95"/>
    <path d="M124 199 L154 153" stroke="#E0F2FE" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Main supplier boxes -->
  <g filter="url(#softShadow)">
    <path d="M450 106 L630 60 L808 106 L630 158 L450 106Z" fill="#FED7AA"/>
    <path d="M450 106 L630 158 V294 L450 236 V106Z" fill="url(#boxGrad)"/>
    <path d="M808 106 L630 158 V294 L808 230 V106Z" fill="#EA580C"/>
    <path d="M630 158 L700 137 V272 L630 294 V158Z" fill="#9A3412" opacity="0.32"/>
    <path d="M520 88 L700 138" stroke="#92400E" stroke-width="10" stroke-linecap="round" opacity="0.28"/>
    <path d="M630 60 L630 158" stroke="#92400E" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
    <rect x="508" y="157" width="82" height="54" rx="10" fill="#FFEDD5" opacity="0.92"/>
    <path d="M526 177 H572 M526 194 H558" stroke="#9A3412" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
    <path d="M774 124 L774 210" stroke="#FDBA74" stroke-width="8" stroke-linecap="round" opacity="0.42"/>
  </g>

  <!-- Books emerging from supplier box -->
  <g filter="url(#softShadow)">
    <rect x="526" y="54" width="34" height="102" rx="8" transform="rotate(-10 526 54)" fill="url(#bookViolet)"/>
    <rect x="570" y="38" width="36" height="118" rx="8" transform="rotate(-2 570 38)" fill="url(#bookBlue)"/>
    <rect x="618" y="34" width="38" height="124" rx="8" transform="rotate(5 618 34)" fill="url(#bookAmber)"/>
    <rect x="666" y="50" width="34" height="104" rx="8" transform="rotate(12 666 50)" fill="#22C55E"/>
    <path d="M544 78 L557 145 M589 58 L593 138 M639 58 L628 136 M682 78 L666 139" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Inventory clipboard -->
  <g filter="url(#softShadow)">
    <rect x="780" y="112" width="150" height="178" rx="20" fill="#F8FAFC" opacity="0.92"/>
    <rect x="825" y="92" width="62" height="36" rx="14" fill="#334155"/>
    <rect x="808" y="144" width="94" height="12" rx="6" fill="#475569" opacity="0.8"/>
    <rect x="808" y="174" width="72" height="10" rx="5" fill="#94A3B8"/>
    <rect x="808" y="202" width="86" height="10" rx="5" fill="#94A3B8"/>
    <rect x="808" y="230" width="58" height="10" rx="5" fill="#94A3B8"/>
    <circle cx="898" cy="178" r="9" fill="#22C55E"/>
    <circle cx="898" cy="206" r="9" fill="#F59E0B"/>
    <circle cx="898" cy="234" r="9" fill="#38BDF8"/>
  </g>

  <!-- Delivery cart / logistics -->
  <g filter="url(#softShadow)">
    <path d="M286 164 H404 L430 250 H322 L286 164Z" fill="#E2E8F0" opacity="0.95"/>
    <path d="M302 190 H414" stroke="#64748B" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
    <path d="M314 224 H424" stroke="#64748B" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
    <path d="M278 142 H300 L322 250 H454" stroke="#334155" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="340" cy="280" r="22" fill="#334155"/>
    <circle cx="432" cy="280" r="22" fill="#334155"/>
    <circle cx="340" cy="280" r="8" fill="#CBD5E1"/>
    <circle cx="432" cy="280" r="8" fill="#CBD5E1"/>
  </g>

  <!-- Small stacked books on cart -->
  <g filter="url(#softShadow)">
    <rect x="320" y="111" width="78" height="22" rx="6" fill="url(#bookViolet)"/>
    <rect x="330" y="87" width="78" height="22" rx="6" fill="url(#bookBlue)"/>
    <rect x="340" y="63" width="78" height="22" rx="6" fill="url(#bookAmber)"/>
    <path d="M354 74 H400 M344 99 H392 M334 122 H382" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Right decorative supply route -->
  <g opacity="0.88">
    <path d="M948 160 C1014 114 1080 122 1122 172 C1152 208 1144 258 1102 278 C1058 300 1006 278 1000 232" stroke="#38BDF8" stroke-width="7" stroke-linecap="round" stroke-dasharray="16 18" opacity="0.55"/>
    <path d="M1112 160 L1134 176 L1108 188" stroke="#38BDF8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Shipping label icons -->
  <g filter="url(#softShadow)">
    <rect x="964" y="180" width="102" height="78" rx="16" fill="#FFFFFF" opacity="0.9"/>
    <path d="M986 204 H1042 M986 226 H1026" stroke="#475569" stroke-width="8" stroke-linecap="round" opacity="0.76"/>
    <path d="M1044 236 L1058 250 L1082 218" stroke="#22C55E" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle sparkles -->
  <path d="M206 88 V112 M194 100 H218" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
  <path d="M914 78 V104 M901 91 H927" stroke="#38BDF8" stroke-width="6" stroke-linecap="round" opacity="0.65"/>
  <path d="M1088 112 V132 M1078 122 H1098" stroke="#A78BFA" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
</svg>
