      <g transform="translate(0 0)">
        <rect x="0" y="0" width="26" height="26" rx="6" fill="#E7DEFF"/>
        <rect x="5" y="5" width="16" height="16" rx="4" fill="#C4AEFF"/>
        <rect x="38" y="4" width="53" height="8" rx="4" fill="#DCD8E7"/>
        <rect x="38" y="17" width="72" height="7" rx="3.5" fill="#EBE7F3"/>
        <rect x="114" y="2" width="24" height="24" rx="8" fill="#EEE9FF"/>
        <path d="M120 15l5 5 10-13" class="line" stroke-width="5"/>
      </g>
      <g transform="translate(0 52)">
        <rect x="0" y="0" width="26" height="26" rx="6" fill="#E7DEFF"/>
        <rect x="5" y="5" width="16" height="16" rx="4" fill="#9A73FF"/>
        <rect x="38" y="4" width="53" height="8" rx="4" fill="#DCD8E7"/>
        <rect x="38" y="17" width="72" height="7" rx="3.5" fill="#EBE7F3"/>
        <rect x="114" y="2" width="24" height="24" rx="8" fill="#EEE9FF"/>
        <path d="M120 15l5 5 10-13" class="line" stroke-width="5"/>
      </g>
      <g transform="translate(0 104)">
        <rect x="0" y="0" width="26" height="26" rx="6" fill="#E7DEFF"/>
        <rect x="5" y="5" width="16" height="16" rx="4" fill="#AE90FF"/>
        <rect x="38" y="4" width="53" height="8" rx="4" fill="#DCD8E7"/>
        <rect x="38" y="17" width="72" height="7" rx="3.5" fill="#EBE7F3"/>
        <rect x="114" y="2" width="24" height="24" rx="8" fill="#EEE9FF"/>
        <path d="M120 15l5 5 10-13" class="line" stroke-width="5"/>
      </g>
      <g transform="translate(0 156)">
        <rect x="0" y="0" width="26" height="26" rx="6" fill="#E7DEFF"/>
        <rect x="5" y="5" width="16" height="16" rx="4" fill="#7D51FF"/>
        <rect x="38" y="4" width="53" height="8" rx="4" fill="#DCD8E7"/>
        <rect x="38" y="17" width="72" height="7" rx="3.5" fill="#EBE7F3"/>
        <rect x="114" y="2" width="24" height="24" rx="8" fill="#EEE9FF"/>
        <path d="M120 15l5 5 10-13" class="line" stroke-width="5"/>
      </g>
    </g>
  </g>

  <!-- Location pin and route -->
  <g transform="translate(1002 265)">
    <path d="M78 0c-26 0-47 20-47 46 0 31 41 73 46 78 1 1 2 2 3 2s2-1 3-2c5-5 46-47 46-78 0-26-21-46-47-46Z" fill="url(#gPurple)"/>
    <circle cx="78" cy="46" r="16" fill="#F8F5FF"/>
    <path d="M0 124c36-39 74-54 116-50" stroke="#C9B5FF" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 14" fill="none"/>
    <circle cx="0" cy="124" r="11" fill="#C9B5FF"/>
  </g>

  <!-- Side foliage right -->
  <g opacity="0.88">
    <path d="M1438 629c15-29 38-49 71-60-2 36-19 62-48 80-12 7-25 11-37 13 5-9 10-20 14-33Z" fill="#C5D59A"/>
    <path d="M1463 684c-31-12-52-32-63-62 36 0 63 15 81 44 7 12 11 24 12 36-8-5-18-11-30-18Z" fill="#AFC283"/>
  </g>

  <!-- Small front box partially behind clipboard -->
  <g transform="translate(1180 570)" filter="url(#softShadow)">
    <rect x="0" y="30" width="98" height="78" rx="10" fill="#D8C4A3" opacity="0.92"/>
    <path d="M0 48 38 28H92l6 20Z" fill="#E7D2B7" opacity="0.9"/>
    <rect x="32" y="30" width="14" height="34" rx="3" fill="#A67BFF" opacity="0.65"/>
  </g>
</svg>
