    <rect x="16" y="42" width="138" height="226" rx="18" fill="#FAF9FE"/>
    <rect x="53" y="0" width="62" height="42" rx="18" fill="#8F67FF"/>
    <rect x="73" y="-9" width="22" height="28" rx="11" fill="#AE90FF"/>

